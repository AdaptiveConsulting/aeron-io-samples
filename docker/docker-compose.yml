---
name: "aeron"

x-base-env: &x-base-env
  CLUSTER_ADDRESSES: "172.16.202.2,172.16.202.3,172.16.202.4"

x-base-build: &x-base-build
  additional_contexts:
    gradle: ../
  cache_from:
    - type=registry,ref=${REPO_NAME}${IMAGE_NAME}:${IMAGE_TAG}
  dockerfile: ./Dockerfile

x-cluster-base: &x-cluster-base
  image: ${PROJECT_REPO:-}cluster:${PROJECT_TAG}
  pull_policy: never
  shm_size: "1gb"

x-cluster-env: &x-cluster-env
  CLUSTER_PORT_BASE: "9000"
  BASE_DIR: "/home/aeron/jar/aeron-cluster"

x-admin-base: &x-admin-base
  image: ${PROJECT_REPO:-}admin:${PROJECT_TAG}
  pull_policy: never
  depends_on:
    - node0
  shm_size: "500mb"
  stdin_open: true
  tty: true

x-admin-env: &x-admin-env
  AUTO_CONNECT: "true"
  DUMB_TERMINAL: "true"

services:
  node0:
    <<: *x-cluster-base
    build:
      <<: *x-base-build
      target: cluster
    hostname: cluster0
    shm_size: "1gb"
    networks:
      internal_bus:
        ipv4_address: 172.16.202.2
    environment:
      <<: [*x-base-env, *x-cluster-env]
      CLUSTER_NODE: "0"
  node1:
    <<: *x-cluster-base
    hostname: cluster1
    networks:
      internal_bus:
        ipv4_address: 172.16.202.3
    environment:
      <<: [*x-base-env, *x-cluster-env]
      CLUSTER_NODE: "1"
  node2:
    <<: *x-cluster-base
    hostname: cluster2
    networks:
      internal_bus:
        ipv4_address: 172.16.202.4
    environment:
      <<: [*x-base-env, *x-cluster-env]
      CLUSTER_NODE: "2"
  admin1:
    <<: *x-admin-base
    build:
      <<: *x-base-build
      target: admin
    hostname: admin1
    networks:
      internal_bus:
        ipv4_address: 172.16.202.10
    environment:
      <<: [*x-base-env, *x-admin-env]
      PARTICIPANT_ID: "500"
  admin2:
    <<: *x-admin-base
    hostname: admin2
    networks:
      internal_bus:
        ipv4_address: 172.16.202.11
    environment:
      <<: [*x-base-env, *x-admin-env]
      PARTICIPANT_ID: "501"
  backup:
    image: ${PROJECT_REPO:-}backup:${PROJECT_TAG}
    pull_policy: never
    build:
      <<: *x-base-build
      target: backup
    hostname: backup
    shm_size: "1gb"
    networks:
      internal_bus:
        ipv4_address: 172.16.202.20
    environment:
      <<: [*x-base-env]
      BACKUP_HOST: "172.16.202.20"
      CLUSTER_PORT_BASE: "9000"
  standby:
    profiles: ["standby"]
    image: ${PROJECT_REPO:-}standby:${PROJECT_TAG}
    pull_policy: never
    build:
      <<: *x-base-build
      target: standby
    hostname: standby
    shm_size: "1gb"
    networks:
      internal_bus:
        ipv4_address: 172.16.202.30
    environment:
      <<: [*x-base-env]
      CLUSTER_PORT_BASE: "9000"
      CLUSTER_NODE: "4"
      STANDBY_HOST: "172.16.202.30"

networks:
  internal_bus:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.driver.mtu: 9000
      com.docker.network.enable_ipv6: "false"
    ipam:
      driver: default
      config:
        - subnet: "172.16.202.0/24"
